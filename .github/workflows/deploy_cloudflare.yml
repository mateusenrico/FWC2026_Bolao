name: Deploy Flutter Web to Cloudflare Pages

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Update JSON data from SportsDB
        run: dart run tools/update_sportsdb.dart

      - name: Show updated data files
        run: |
          echo "Updated JSON files:"
          ls -lah assets/data/*.json
          echo ""
          echo "Backup folders generated during CI, if any:"
          ls -lah assets/data/backups || true

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Verify Flutter Web build output
        run: |
          test -f build/web/index.html
          ls -la build/web
          find build/web -maxdepth 2 -type f | head -50

      - name: Install Wrangler
        run: npm install --include=optional --no-audit --no-fund wrangler@latest

      - name: Show Wrangler version
        run: npx wrangler --version

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy build/web \
            --project-name bolao2026fwc \
            --branch ${{ github.ref_name }} \
            --commit-dirty=true
