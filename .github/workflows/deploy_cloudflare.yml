name: Deploy Flutter Web to Cloudflare Pages - Bolão 2026 FWC

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Update JSON data from SportsDB
        run: dart run tools/update_sportsdb.dart

      - name: Show updated data files
        run: |
          echo "Updated JSON files:"
          ls -lah assets/data/*.json
          echo ""
          echo "Backup folders generated during CI, if any:"
          ls -lah assets/data/backups || true

      - name: Analyze project
        run: flutter analyze

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Verify Flutter Web build output
        run: |
          test -f build/web/index.html
          ls -la build/web
          find build/web -maxdepth 2 -type f | head -50

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name bolao2026fwc --branch ${{ github.ref_name }} --commit-dirty=true